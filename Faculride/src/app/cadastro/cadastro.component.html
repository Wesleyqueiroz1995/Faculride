
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<section class="register-section">
  <h2>Vamos começar criando sua conta</h2>
  <!-- Seleção do tipo de usuário com evento de alteração -->
  <select id="tipoUsuario" [(ngModel)]="tipoUsuario" (change)="alternarCamposMotorista()">
    <option value="passageiro">Passageiro</option>
    <option value="motorista">Motorista</option>
  </select>

  <!-- Campos comuns para todos os usuários -->
  <input type="text" placeholder="Nome" required>
  <input type="text" placeholder="Sobrenome" required>
  <input type="email" placeholder="Email" required>
  <input type="tel" placeholder="Telefone" pattern="\(\d{2}\) \d{5}-\d{4}" maxlength="15" required>
  <input type="text" placeholder="Endereço" required>
  <select required>
    <option value="" disabled selected>Sua Fatec</option>
    <option value="FATEC Sorocaba">FATEC Sorocaba</option>
    <option value="FATEC Votorantim">FATEC Votorantim</option>
  </select>
  <input type="text" placeholder="Seu R.A" pattern="\d{9}" maxlength="9" required>
  <select required>
    <option value="" disabled selected>Gênero</option>
    <option value="Masculino">Masculino</option>
    <option value="Feminino">Feminino</option>
    <option value="Prefiro não me identificar">Prefiro não me identificar</option>
  </select>
  <input type="date" placeholder="Data de nascimento" required>

  <!-- Campos específicos para motorista -->
  <div *ngIf="isMotorista" class="campos-motorista">
    <input type="text" placeholder="CNH" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" maxlength="11">
    <input type="text" placeholder="Modelo do carro">
    <select required>
      <option *ngFor="let ano of anoCarroOptions" [value]="ano">{{ ano }}</option>
    </select>
    <input type="text" placeholder="Placa" pattern="[A-Z0-9]{7}" maxlength="7">
  </div>

  <button (click)="criarConta()">Criar Conta</button>
</section>
